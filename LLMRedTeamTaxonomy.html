const D=raw.map(d=>({id:d[0],t:d[1],s:d[2],c:d[3],r:d[4],d:d[5],g:d[6],p:d[7]}));
let currentFilter="All",currentRisk="All";

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const s=document.getElementById('searchInput').value.toLowerCase();
  const f=D.filter(i=>{
    const ms=!s||[i.t,i.s,i.d,i.p,i.c,i.g].some(x=>x.toLowerCase().includes(s));
    return ms&&(currentFilter==="All"||i.c===currentFilter)&&(currentRisk==="All"||i.r===currentRisk);
  });
  document.getElementById('countLabel').textContent=f.length+'/'+D.length;
  document.getElementById('resetBtn').classList.toggle('hidden',currentFilter==="All"&&currentRisk==="All"&&!s);
  
  const g=document.getElementById('grid');
  if(!f.length){g.innerHTML='<div class="col-span-full py-12 text-center text-slate-500 bg-white rounded-xl border">No vectors match criteria.</div>';return;}
  
  g.innerHTML=f.map(i=>{
    const cat=C[i.c]||{c:'#888'};
    return `<article class="card bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col h-full overflow-hidden">
      <div class="h-1 w-full" style="background:${cat.c}"></div>
      <div class="p-3.5 flex-grow flex flex-col">
        <div class="flex justify-between items-start mb-1.5 gap-1">
          <span class="px-1.5 py-0.5 rounded text-[8px] font-bold uppercase tracking-wide bg-slate-100 text-slate-600 truncate max-w-[60%]">${esc(i.c)}</span>
          <span class="${rc[i.r]} px-1.5 py-0.5 rounded text-[8px] font-bold uppercase tracking-wide text-white shadow-sm">${i.r}</span>
        </div>
        <h3 class="text-sm font-extrabold text-slate-900 leading-tight">${esc(i.t)}</h3>
        <h4 class="text-[9px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">${esc(i.s)}</h4>
        <p class="text-[11px] text-slate-600 mb-2 flex-grow leading-relaxed">${esc(i.d)}</p>
        <div class="bg-slate-50 p-2 rounded-lg border border-slate-100 mb-2">
          <div class="text-[8px] font-bold text-slate-400 uppercase mb-0.5">Goal</div>
          <p class="text-[10px] text-slate-700 font-medium">${esc(i.g)}</p>
        </div>
        <div>
          <div class="text-[8px] font-bold text-red-400 uppercase mb-0.5">&#9889; Example Prompt / Payload</div>
          <div class="font-mono text-[9px] bg-red-50 px-2 py-1.5 rounded text-red-900 border border-red-200 break-words leading-relaxed max-h-24 overflow-y-auto">${esc(i.p)}</div>
        </div>
      </div>
    </article>`;
  }).join('');
}

function init(){
  // Tags
  document.getElementById('tags').innerHTML=["MCP Protocol","GCG/AutoDAN/PAIR","Refusal Ablation","OWASP 2025/2026","A2A/Agentic","RAG Pipeline","Multi-Modal","Supply Chain"].map(t=>`<span class="px-2 py-0.5 rounded-full bg-white/10 border border-white/20 text-[9px] font-bold uppercase">${t}</span>`).join('');
  
  document.getElementById('heroDesc').innerHTML=`<strong>${D.length} exploit vectors</strong> across ${Object.keys(C).length} domains &middot; 2021&ndash;2026 research &middot; Every vector includes a specific prompt/payload example`;
  
  // Stats
  const stats=[["Total",D.length,"text-slate-900"],["Critical",D.filter(d=>d.r==="Critical").length,"text-red-600"],["High",D.filter(d=>d.r==="High").length,"text-amber-600"],["Medium",D.filter(d=>d.r==="Medium").length,"text-blue-600"],["Categories",Object.keys(C).length,"text-violet-600"],["With Prompts",D.length,"text-emerald-600"]];
  document.getElementById('statsBar').innerHTML=stats.map(([n,v,cl])=>`<div><div class="text-xl font-extrabold ${cl}">${v}</div><div class="text-[9px] font-bold text-slate-400 uppercase">${n}</div></div>`).join('');
  
  // Category counts
  const cc={};Object.keys(C).forEach(k=>cc[k]=0);D.forEach(d=>{if(cc[d.c]!==undefined)cc[d.c]++;});
  
  // Cat buttons
  let cb=`<button onclick="setFilter('All')" class="p-2 rounded-lg border text-left transition-all ${currentFilter==='All'?'border-slate-900 bg-slate-900 text-white':'border-slate-200 bg-white hover:border-slate-400'}"><div class="text-[9px] font-bold uppercase">All</div><div class="text-lg font-extrabold">${D.length}</div></button>`;
  Object.entries(cc).forEach(([k,v])=>{
    cb+=`<button onclick="setFilter('${k.replace(/'/g,"\\'")}')" class="p-2 rounded-lg border text-left transition-all ${currentFilter===k?'border-slate-900 bg-slate-900 text-white':'border-slate-200 bg-white hover:border-slate-400'}"><div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:${C[k].c}"></span><span class="text-[8px] font-bold uppercase truncate">${k}</span></div><div class="text-lg font-extrabold">${v}</div></button>`;
  });
  document.getElementById('catButtons').innerHTML=cb;
  
  // Risk buttons
  document.getElementById('riskButtons').innerHTML=["All","Critical","High","Medium","Low"].map(r=>`<button onclick="setRisk('${r}')" class="px-2.5 py-1.5 rounded-lg text-xs font-bold ${currentRisk===r?'bg-slate-800 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}">${r==='All'?'All Risk':r}</button>`).join('');
  
  document.getElementById('footerText').textContent=D.length+' vectors · '+Object.keys(C).length+' categories · 2021-2026 · OWASP · MITRE ATLAS · MCP Security';
  render();
}

window.setFilter=function(c){currentFilter=c;init();};
window.setRisk=function(r){currentRisk=r;init();};
document.getElementById('resetBtn').addEventListener('click',()=>{currentFilter="All";currentRisk="All";document.getElementById('searchInput').value='';init();});
document.getElementById('searchInput').addEventListener('input',render);
init();
</script>
